<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --red:#E8342A;
  --red-dark:#C5281F;
  --red-bg:rgba(232,52,42,0.07);
  --red-border:rgba(232,52,42,0.2);
  --white:#FFFFFF;
  --bg:#EFEFEF;
  --surface:#FFFFFF;
  --border:#E2E2E2;
  --border-hover:#C8C8C8;
  --text:#0F0F0F;
  --mid:#505050;
  --muted:#A0A0A0;
  --chip-bg:#E8E8E8;
  --chip-active-bg:#0F0F0F;
  --chip-active-text:#FFFFFF;
  --r:8px;
  --r-lg:16px;
  --r-xl:20px;
}

html{scroll-behavior:smooth;}
body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:0 0 80px;
}

/* ── HERO ── */
.hero{
  background:var(--white);
  border-bottom:1px solid var(--border);
  padding:40px 28px 28px;
}
.hero-inner{max-width:660px;margin:0 auto;}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:28px;}
.hero-label{font-size:0.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:8px;}
.hero h1{font-size:1.75rem;font-weight:800;line-height:1.1;color:var(--text);letter-spacing:-.02em;}
.hero-stats{display:flex;gap:6px;flex-shrink:0;margin-top:4px;}
.stat-pill{
  display:flex;flex-direction:column;align-items:center;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r);padding:8px 14px;min-width:56px;
}
.stat-num{font-size:1.1rem;font-weight:800;color:var(--text);line-height:1;}
.stat-lbl{font-size:0.55rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:3px;}

/* ── SEARCH BOX ── */
.search-outer{position:relative;}
.search-box{
  display:flex;align-items:center;gap:0;
  background:var(--bg);
  border:2px solid var(--border);
  border-radius:var(--r-xl);
  overflow:hidden;
  transition:border-color .15s,box-shadow .15s;
}
.search-box:focus-within{
  border-color:var(--red);
  box-shadow:0 0 0 4px rgba(232,52,42,.1);
  background:var(--white);
}
.search-ico{padding:0 14px 0 18px;color:var(--muted);display:flex;flex-shrink:0;}
.search-input{
  flex:1;border:none;background:none;
  padding:15px 0;
  font-family:'Poppins',sans-serif;
  font-size:0.95rem;font-weight:500;
  color:var(--text);
}
.search-input:focus{outline:none;}
.search-input::placeholder{color:#C0C0C0;font-weight:400;}
.search-clear{
  background:none;border:none;cursor:pointer;
  padding:0 18px;color:var(--muted);
  display:none;align-items:center;
  transition:color .15s;font-size:18px;line-height:1;
}
.search-clear:hover{color:var(--text);}
.search-clear.on{display:flex;}

/* ── AREA CHIPS ── */
.chips-wrap{max-width:660px;margin:0 auto;padding:16px 28px 0;}
.chips-scroll{display:flex;gap:6px;flex-wrap:wrap;}
.chip{
  font-family:'Poppins',sans-serif;
  font-size:0.72rem;font-weight:600;
  background:var(--chip-bg);color:var(--mid);
  border:1.5px solid transparent;
  border-radius:20px;padding:6px 14px;
  cursor:pointer;white-space:nowrap;
  transition:background .12s,color .12s,border-color .12s;
  display:flex;align-items:center;gap:6px;
}
.chip:hover{background:#DEDEDE;color:var(--text);}
.chip.active{background:var(--chip-active-bg);color:var(--chip-active-text);border-color:transparent;}
.chip-dot{width:7px;height:7px;border-radius:50%;}
.dot-int{background:#E8342A;}
.dot-sens{background:#F5973A;}
.dot-est{background:#5B8FD4;}
.chip.active .chip-dot{opacity:.7;}

/* ── MAIN CONTENT ── */
.content{max-width:660px;margin:0 auto;padding:24px 28px 0;}

/* ── RESULTS META ── */
.results-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;min-height:20px;
}
.results-meta-left{font-size:0.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.results-meta-left strong{color:var(--text);font-weight:700;}

/* ── RESULT CARD ── */
.result-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--r-lg);
  padding:16px 18px;
  margin-bottom:8px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:16px;
  transition:border-color .15s,box-shadow .12s,transform .12s;
  cursor:default;
}
.result-card:hover{
  border-color:var(--border-hover);
  box-shadow:0 4px 16px rgba(0,0,0,.08);
  transform:translateY(-1px);
}

.rc-codi{
  font-size:1rem;font-weight:800;
  font-family:'Poppins',monospace;
  color:var(--red);
  background:var(--red-bg);
  border:1.5px solid var(--red-border);
  padding:10px 14px;
  border-radius:var(--r);
  min-width:78px;text-align:center;
  letter-spacing:.02em;line-height:1;
  flex-shrink:0;
}

.rc-info{}
.rc-compte{font-size:0.9rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:6px;}
.rc-path{display:flex;flex-wrap:wrap;align-items:center;gap:4px;}
.rc-crumb{
  font-size:0.65rem;font-weight:600;
  color:var(--mid);
  background:#F4F4F4;
  border-radius:20px;
  padding:2px 8px;
  white-space:nowrap;
}
.rc-sep{font-size:0.55rem;color:var(--muted);}

.rc-action{}
.rc-copy{
  font-family:'Poppins',sans-serif;
  font-size:0.78rem;font-weight:700;
  color:var(--white);
  background:var(--red);
  border:none;border-radius:var(--r);
  padding:11px 18px;
  cursor:pointer;white-space:nowrap;
  transition:background .15s,transform .1s,box-shadow .15s;
  box-shadow:0 2px 6px rgba(232,52,42,.3);
}
.rc-copy:hover{background:var(--red-dark);transform:translateY(-1px);box-shadow:0 4px 10px rgba(232,52,42,.35);}
.rc-copy:active{transform:translateY(0);box-shadow:none;}
.rc-copy.ok{background:#2E7D32;box-shadow:0 2px 6px rgba(46,125,50,.3);}

/* ── EMPTY STATE ── */
.empty-state{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--r-lg);
  padding:48px 32px;
  text-align:center;
}
.empty-state p{font-size:0.88rem;color:var(--muted);line-height:1.7;}
.empty-state strong{color:var(--mid);}

/* ── SECTION HEADER ── */
.section-header{
  font-size:0.62rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);
  margin:24px 0 10px;display:flex;align-items:center;gap:10px;
}
.section-header:first-child{margin-top:0;}
.section-header::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── SUB HEADER ── */
.sub-header{
  font-size:0.65rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--mid);
  background:#F4F4F4;border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;
  margin:12px 0 6px;display:inline-block;
}

mark{background:#FFF3CC;color:#7A5800;border-radius:2px;padding:0 1px;}

/* ── FOOTER ── */
footer{
  max-width:660px;margin:48px auto 0;
  padding:0 28px;font-size:0.65rem;color:#CACACA;
}
footer a{color:#CACACA;text-decoration:none;}
footer a:hover{color:var(--red);}

@media(max-width:520px){
  .hero{padding:28px 18px 22px;}
  .chips-wrap{padding:14px 18px 0;}
  .content{padding:20px 18px 0;}
  .hero h1{font-size:1.4rem;}
  .result-card{grid-template-columns:auto 1fr;gap:12px;}
  .rc-action{grid-column:1/-1;}
  .rc-copy{width:100%;text-align:center;}
  .hero-stats{display:none;}
}
</style>
</head>

function hl(text,q){
  if(!q) return esc(text);
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}

// ── STATS ──
const areas = uniq(DATA.map(d=>d.area));
document.getElementById('hero-stats').innerHTML=`
  <div class="stat-pill"><span class="stat-num">${DATA.length}</span><span class="stat-lbl">Codis</span></div>
  <div class="stat-pill"><span class="stat-num">${areas.length}</span><span class="stat-lbl">Àrees</span></div>`;

// ── CHIPS ──
const chipsEl = document.getElementById('chips');
let activeChip = null;

// "Tots" chip
const allChip = document.createElement('button');
allChip.className='chip active';
allChip.innerHTML='Tots els codis';
allChip.dataset.area='';
chipsEl.appendChild(allChip);

areas.forEach(area=>{
  const act = DATA.find(d=>d.area===area).activitat;
  const btn = document.createElement('button');
  btn.className='chip';
  btn.dataset.area=area;
  btn.innerHTML=`<span class="chip-dot ${dotClass(act)}"></span>${esc(area)}`;
  chipsEl.appendChild(btn);
});

chipsEl.addEventListener('click',e=>{
  const chip=e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  activeChip = chip.dataset.area || null;
  render();
});

// ── SEARCH ──
const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('s-clear');

searchEl.addEventListener('input',()=>{ render(); clearBtn.classList.toggle('on', searchEl.value.trim().length>0); });
clearBtn.addEventListener('click',()=>{ searchEl.value=''; clearBtn.classList.remove('on'); render(); searchEl.focus(); });

// ── RENDER ──
const metaEl = document.getElementById('results-meta');
const listEl = document.getElementById('results-list');

function render(){
  const raw = searchEl.value.trim();
  const q   = raw.toLowerCase();

  let pool = activeChip ? DATA.filter(d=>d.area===activeChip) : DATA;

  let results;
  if(q){
    const scored = pool.map(d=>{
      const hay=[d.codi,d.compte,d.area,d.subarea,d.activitat].join(' ').toLowerCase();
      if(!hay.includes(q)) return null;
      const codiL=d.codi.toLowerCase();
      const score = codiL===q?3:codiL.includes(q)?2:1;
      return {d,score};
    }).filter(Boolean).sort((a,b)=>b.score-a.score);
    results = scored;
  } else {
    results = pool.map(d=>({d,score:0}));
  }

  // META
  if(!q && !activeChip){
    metaEl.innerHTML=`<span class="results-meta-left">Cerca o filtra per àrea · <strong>${DATA.length} codis disponibles</strong></span>`;
  } else if(results.length>0){
    const label = activeChip ? `<strong>${esc(activeChip)}</strong>` : `"${esc(raw)}"`;
    metaEl.innerHTML=`<span class="results-meta-left"><strong>${results.length}</strong> resultat${results.length!==1?'s':''} ${q?`per ${label}`:''}</span>`;
  } else {
    metaEl.innerHTML='';
  }

  // LIST
  if(results.length===0){
    listEl.innerHTML=`
      <div class="empty-state">
        <p>Cap resultat per a <strong>"${esc(raw)}"</strong>.<br>Prova amb un altre terme o selecciona una àrea dels filtres de dalt.</p>
      </div>`;
    return;
  }

  // Always group by area → subarea
  if(!q){
    // No search: group area > subarea cleanly
    let html='';
    areas.forEach(area=>{
      const areaData = results.filter(r=>r.d.area===area);
      if(!areaData.length) return;
      const act = areaData[0].d.activitat;
      const subs = uniq(areaData.map(r=>r.d.subarea));
      html+=`<div class="section-header"><span class="chip-dot ${dotClass(act)}" style="display:inline-block;margin-right:6px;width:7px;height:7px;border-radius:50%"></span>${esc(area)}</div>`;
      subs.forEach(sub=>{
        const subData = areaData.filter(r=>r.d.subarea===sub);
        if(sub !== area){
          html+=`<div class="sub-header">${esc(sub)}</div>`;
        }
        subData.forEach(({d})=>{ html+=renderCard(d,''); });
      });
    });
    listEl.innerHTML=html;
  } else {
    // Search: flat results but show subarea crumb clearly
    listEl.innerHTML = results.map(({d})=>renderCard(d,raw)).join('');
  }
}

function renderCard(d, q){
  const showSub = d.subarea !== d.area;
  return `
    <div class="result-card">
      <div class="rc-codi">${hl(d.codi,q)}</div>
      <div class="rc-info">
        <div class="rc-compte">${hl(d.compte,q)}</div>
        <div class="rc-path">
          <span class="rc-crumb">${hl(d.activitat,q)}</span>
          <span class="rc-sep">›</span>
          <span class="rc-crumb">${hl(d.area,q)}</span>
          ${showSub?`<span class="rc-sep">›</span><span class="rc-crumb">${hl(d.subarea,q)}</span>`:''}
        </div>
      </div>
      <div class="rc-action">
        <button class="rc-copy" data-codi="${esc(d.codi)}">Copiar codi</button>
      </div>
    </div>`;
}

listEl.addEventListener('click',e=>{
  const btn=e.target.closest('.rc-copy');
  if(!btn) return;
  navigator.clipboard.writeText(btn.dataset.codi).then(()=>{
    btn.textContent='Copiat!';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='Copiar codi';btn.classList.remove('ok');},2000);
  });
});

render();
</script>
</body>
</html>
